name: build-docker

# Builds and publishes the sconce container image on GitHub-hosted runners.
#
# Three entry points:
#
#   * release (published): release-please publishes a `sconce-v<version>`
#     GitHub Release; that fires this workflow, which builds the multi-arch
#     image and pushes versioned + rolling tags to GHCR.
#
#   * workflow_dispatch: manually build + push a given `sconce-v<version>` tag,
#     e.g. to republish or to cut an image outside the release flow.
#
#   * pull_request: a push-free smoke build (amd64 only) whenever the Dockerfile
#     or the cargo sources change, so a broken image build is caught on the PR
#     rather than at release time.
#
# Image (GHCR only for now — Docker Hub can be added later as a second login +
# push target):
#
#   ghcr.io/cresset-tools/sconce:<version>        always
#   ghcr.io/cresset-tools/sconce:<major>.<minor>  stable releases only
#   ghcr.io/cresset-tools/sconce:latest           stable releases only
#
# Multi-arch strategy: each architecture builds natively on its own
# GitHub-hosted runner — amd64 on `ubuntu-latest`, arm64 on the free
# `ubuntu-24.04-arm` runner (this repo is public, so arm runners cost nothing).
# No QEMU, no cross-compile. Each per-arch leg pushes an untagged image *by
# digest*; the follow-up `publish` merge job assembles the per-arch digests
# into one multi-arch manifest with `buildx imagetools create` and applies the
# release tags. This Dockerfile compiles natively on each arch. Layer cache is
# the GitHub Actions cache (`type=gha`), scoped per arch so the two legs don't
# clobber each other.
#
# Attestation: per-arch builds set `provenance: false` so `push-by-digest`
# yields clean single-arch image digests (deterministic for the merge);
# provenance is attested once, on the final multi-arch index, via
# actions/attest-build-provenance (push-to-registry), which is the
# authoritative, GitHub-visible attestation.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. sconce-v0.1.0"
        required: true
        type: string
  pull_request:
    paths:
      - "Dockerfile"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".dockerignore"
      - ".github/workflows/build-docker.yml"

permissions: {}

env:
  # github.repository is already lowercase for this repo; GHCR requires it.
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # PR smoke test: prove the image still builds. amd64 only (the arm64 leg is
  # the same native build, just on an arm64 runner) and never pushed.
  pr-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=sconce-linux-amd64
          cache-to: type=gha,mode=max,scope=sconce-linux-amd64

  # Release: build the image natively per-arch and push each leg to GHCR by
  # digest (untagged). The `publish` merge job assembles them into one manifest.
  build:
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { arch: linux/amd64, runner: ubuntu-latest }
          - { arch: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Platform pair
        run: |
          platform='${{ matrix.platform.arch }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform.arch }}
          tags: ${{ env.IMAGE }}
          # Clean single-arch image digests for a deterministic merge;
          # provenance is attested on the final index in the `publish` job.
          provenance: false
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=sconce-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=sconce-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Release: merge the per-arch digests into one multi-arch manifest, tag it,
  # and attest the final index.
  publish:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # attestations
      attestations: write
    steps:
      - name: Derive version from the release tag
        id: ver
        # The tag is `sconce-v<version>`; strip the namespace to get the bare
        # semver used for image tags. major.minor + latest are only meaningful
        # for stable releases, so gate them on the prerelease flag — taken from
        # the release event when present, else inferred from a semver `-` suffix.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            tag='${{ github.event.release.tag_name }}'
            prerelease='${{ github.event.release.prerelease }}'
          else
            tag='${{ inputs.tag }}'
            prerelease=''
          fi
          version="${tag#sconce-v}"
          if [ -z "$prerelease" ]; then
            case "$version" in
              *-*) prerelease=true ;;
              *)   prerelease=false ;;
            esac
          fi
          {
            echo "version=${version}"
            echo "major_minor=${version%.*}"
            echo "is_prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major_minor }},enable=${{ steps.ver.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.is_prerelease == 'false' }}

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Record final digest
        id: digest
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect \
            "${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
