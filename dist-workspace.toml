# dist configuration — produces per-target binary archives plus
# shell/powershell installers for the `sconce` binary. release-please owns the
# release: it publishes the `sconce-v<version>` GitHub Release (creating the
# tag), and the `release: published` event triggers dist to build binaries and
# upload them onto that release.
#
# Edit this file when adding targets / installers, then regenerate the workflow
# with `dist generate` (rewrites .github/workflows/release.yml). NOTE: `dist
# generate` emits an `on: push: tags` trigger; hand-edit it to `on: release:
# published` (release-please creates tags via the API, which doesn't reliably
# fire `push`). Re-apply that edit after any regenerate.

[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.32.0"
ci = "github"
installers = ["shell", "powershell"]
windows-archive = ".zip"
unix-archive = ".tar.gz"
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
auto-includes = false
create-release = false
allow-dirty = ["ci"]
pr-run-mode = "skip"
tag-namespace = "sconce"
install-path = ["$XDG_BIN_HOME/", "$XDG_DATA_HOME/../bin", "~/.local/bin"]
hosting = ["github"]

# Floor the gnu build at glibc 2.17 (manylinux2014 / CentOS 7 baseline) so the
# binary runs on RHEL 8 / Debian 11 / Ubuntu 20.04.
[dist.github-custom-runners.x86_64-unknown-linux-gnu]
container = { image = "quay.io/pypa/manylinux2014_x86_64", host = "x86_64-unknown-linux-musl" }

[dist.min-glibc-version]
"*" = "2.17"

[dist.binaries]
"*" = ["sconce"]
